<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Data Coverage — Gantt Chart</title>
<style>
  :root {
    --bg: #0a0e17; --surface: #111827; --border: #1e293b;
    --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
    --purple: #a855f7; --cyan: #06b6d4; --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); }

  .header {
    padding: 24px 32px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(180deg, #111827 0%, #0a0e17 100%);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .stats { display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .filters {
    padding: 12px 32px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; background: var(--surface);
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .chart-container { padding: 16px 32px; overflow-x: auto; }

  .gantt-row {
    display: grid; grid-template-columns: 280px 1fr 120px;
    align-items: center; border-bottom: 1px solid var(--border);
    min-height: 36px; font-size: 12px;
  }
  .gantt-row:hover { background: rgba(59,130,246,0.05); }
  .gantt-row.section-header {
    background: var(--surface); font-weight: 700; font-size: 13px;
    min-height: 32px; border-bottom: 2px solid var(--border);
    grid-template-columns: 1fr;
  }
  .gantt-label {
    padding: 4px 12px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; display: flex; align-items: center; gap: 8px;
  }
  .gantt-label .exchange-badge {
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
    font-weight: 600; text-transform: uppercase;
  }
  .exchange-binance { background: #f0b90b22; color: #f0b90b; }
  .exchange-coinbase { background: #0052ff22; color: #4d8eff; }
  .exchange-kraken { background: #7b61ff22; color: #9b85ff; }
  .exchange-yahoo { background: #720e9e22; color: #b366e0; }
  .exchange-fred { background: #00529b22; color: #5599cc; }
  .exchange-defilama { background: #22c55e22; color: #22c55e; }
  .exchange-coinglass { background: #f9731622; color: #f97316; }
  .exchange-deribit { background: #06b6d422; color: #06b6d4; }
  .exchange-other { background: #64748b22; color: #94a3b8; }

  .gantt-bar-container {
    position: relative; height: 24px; margin: 0 4px;
  }
  .gantt-bar {
    position: absolute; height: 20px; top: 2px; border-radius: 3px;
    min-width: 2px; cursor: pointer; transition: opacity 0.15s;
  }
  .gantt-bar:hover { opacity: 0.85; filter: brightness(1.2); }
  .gantt-bar.futures { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .gantt-bar.spot { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .gantt-bar.macro { background: linear-gradient(90deg, #a855f7, #c084fc); }
  .gantt-bar.defi { background: linear-gradient(90deg, #06b6d4, #22d3ee); }
  .gantt-bar.derivatives { background: linear-gradient(90deg, #f97316, #fb923c); }
  .gantt-bar.onchain { background: linear-gradient(90deg, #ec4899, #f472b6); }
  .gantt-bar.sentiment { background: linear-gradient(90deg, #64748b, #94a3b8); }

  .gantt-gap {
    position: absolute; height: 20px; top: 2px;
    background: repeating-linear-gradient(45deg, transparent, transparent 3px, #ef444433 3px, #ef444433 6px);
    border: 1px dashed var(--red); border-radius: 2px;
  }

  .gantt-meta {
    padding: 4px 8px; text-align: right; color: var(--muted); font-size: 11px;
    white-space: nowrap;
  }
  .gantt-meta .rows { color: var(--text); font-weight: 600; }

  .timeline-header {
    display: grid; grid-template-columns: 280px 1fr 120px;
    border-bottom: 2px solid var(--accent); padding: 8px 0;
    font-size: 11px; color: var(--muted); font-weight: 600;
  }
  .timeline-ticks { position: relative; margin: 0 4px; height: 20px; }
  .tick { position: absolute; top: 0; font-size: 10px; color: var(--muted); }
  .tick::after {
    content: ''; position: absolute; left: 0; top: 16px;
    width: 1px; height: 2000px; background: var(--border); opacity: 0.3;
  }

  .tooltip {
    display: none; position: fixed; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px;
    font-size: 12px; z-index: 100; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tooltip.show { display: block; }
  .tooltip h3 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
  .tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; margin: 3px 0; }
  .tooltip .tt-label { color: var(--muted); }
  .tooltip .tt-value { font-weight: 600; }
  .tooltip .tt-gap { color: var(--red); }

  .legend {
    padding: 16px 32px; border-top: 1px solid var(--border);
    display: flex; gap: 20px; flex-wrap: wrap; font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 10px; border-radius: 2px; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; padding: 16px 32px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; text-align: center;
  }
  .summary-card .val { font-size: 28px; font-weight: 700; }
  .summary-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Crypto Data <span>Coverage Dashboard</span></h1>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="total-datasets">—</div><div class="stat-label">Datasets</div></div>
    <div class="stat"><div class="stat-value" id="total-rows">—</div><div class="stat-label">Total Rows</div></div>
    <div class="stat"><div class="stat-value" id="total-span">—</div><div class="stat-label">Max Span</div></div>
    <div class="stat"><div class="stat-value" id="total-gaps">—</div><div class="stat-label">Gaps Found</div></div>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="summary-grid" id="summary"></div>

<div class="chart-container" id="chart"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div>Futures</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#22c55e,#4ade80)"></div>Spot</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#a855f7,#c084fc)"></div>Macro</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#06b6d4,#22d3ee)"></div>DeFi</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#f97316,#fb923c)"></div>Derivatives</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#ec4899,#f472b6)"></div>On-chain</div>
  <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#64748b,#94a3b8)"></div>Sentiment</div>
  <div class="legend-item"><div class="legend-swatch" style="background:repeating-linear-gradient(45deg,transparent,transparent 3px,#ef444433 3px,#ef444433 6px);border:1px dashed #ef4444"></div>Gap (&gt;1h)</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const DATA_URL = 'data.json';

let allData = [];
let activeFilter = 'all';

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

function exchangeClass(src) {
  const s = src.toLowerCase();
  if (s.includes('binance')) return 'exchange-binance';
  if (s.includes('coinbase')) return 'exchange-coinbase';
  if (s.includes('kraken')) return 'exchange-kraken';
  if (s.includes('yahoo')) return 'exchange-yahoo';
  if (s.includes('fred') || s.includes('treasury')) return 'exchange-fred';
  if (s.includes('defilama')) return 'exchange-defilama';
  if (s.includes('coinglass')) return 'exchange-coinglass';
  if (s.includes('deribit')) return 'exchange-deribit';
  return 'exchange-other';
}

async function init() {
  const resp = await fetch(DATA_URL);
  const json = await resp.json();
  allData = json.datasets;

  document.getElementById('total-datasets').textContent = json.total_datasets;
  document.getElementById('total-rows').textContent = formatNum(json.total_rows);

  const maxSpan = Math.max(...allData.map(d => d.span_hours));
  document.getElementById('total-span').textContent = Math.round(maxSpan) + 'h';

  const totalGaps = allData.reduce((s, d) => s + d.gaps.length, 0);
  document.getElementById('total-gaps').textContent = totalGaps;

  // Filters
  const markets = [...new Set(allData.map(d => d.market))];
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = `<button class="filter-btn active" data-filter="all">All</button>` +
    markets.map(m => `<button class="filter-btn" data-filter="${m}">${m.charAt(0).toUpperCase() + m.slice(1)}</button>`).join('');

  filtersEl.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    render();
  });

  render();
}

function render() {
  const filtered = activeFilter === 'all' ? allData : allData.filter(d => d.market === activeFilter);

  // Global time range
  const globalMin = Math.min(...filtered.map(d => d.min_ts));
  const globalMax = Math.max(...filtered.map(d => d.max_ts));
  const range = globalMax - globalMin;

  // Summary cards
  const summaryEl = document.getElementById('summary');
  const markets = [...new Set(filtered.map(d => d.market))];
  const marketColors = {futures:'#3b82f6',spot:'#22c55e',macro:'#a855f7',defi:'#06b6d4',derivatives:'#f97316',onchain:'#ec4899',sentiment:'#64748b'};
  summaryEl.innerHTML = markets.map(m => {
    const mdata = filtered.filter(d => d.market === m);
    const rows = mdata.reduce((s,d) => s + d.total_rows, 0);
    const color = marketColors[m] || '#64748b';
    return `<div class="summary-card"><div class="val" style="color:${color}">${formatNum(rows)}</div><div class="lbl">${m} rows</div></div>`;
  }).join('');

  // Chart
  const chartEl = document.getElementById('chart');
  let html = '';

  // Timeline header with ticks
  html += `<div class="timeline-header">
    <div style="padding-left:12px">Dataset</div>
    <div class="timeline-ticks" id="ticks"></div>
    <div style="text-align:right;padding-right:8px">Rows</div>
  </div>`;

  // Group by market
  const grouped = {};
  filtered.forEach(d => {
    if (!grouped[d.market]) grouped[d.market] = [];
    grouped[d.market].push(d);
  });

  const marketOrder = ['futures','spot','macro','defi','derivatives','onchain','sentiment'];
  const marketEmoji = {futures:'⚡',spot:'🟢',macro:'📈',defi:'🌐',derivatives:'📊',onchain:'⛓️',sentiment:'💬'};

  for (const market of marketOrder) {
    if (!grouped[market]) continue;
    const items = grouped[market];

    html += `<div class="gantt-row section-header">
      <div style="padding:4px 12px">${marketEmoji[market]||''} ${market.toUpperCase()} (${items.length} sources)</div>
    </div>`;

    for (const d of items) {
      const leftPct = ((d.min_ts - globalMin) / range * 100).toFixed(2);
      const widthPct = Math.max(0.3, ((d.max_ts - d.min_ts) / range * 100)).toFixed(2);

      // Gap bars
      let gapBars = '';
      for (const g of d.gaps) {
        const gLeft = ((g.start_ts * 1000 - globalMin) / range * 100).toFixed(2);
        const gWidth = Math.max(0.2, ((g.end_ts * 1000 - g.start_ts * 1000) / range * 100)).toFixed(2);
        gapBars += `<div class="gantt-gap" style="left:${gLeft}%;width:${gWidth}%" data-gap="${g.hours}h"></div>`;
      }

      // File sub-bars (tank vs spark)
      let fileBars = '';
      for (const f of d.file_ranges) {
        if (!f.min_ts) continue;
        const fLeft = ((f.min_ts * 1000 - globalMin) / range * 100).toFixed(2);
        const fWidth = Math.max(0.15, ((f.max_ts * 1000 - f.min_ts * 1000) / range * 100)).toFixed(2);
        const opacity = f.source === 'tank' ? 1 : 0.6;
        const border = f.source === 'spark' ? 'border:1px solid rgba(255,255,255,0.2)' : '';
        fileBars += `<div class="gantt-bar ${d.market}" style="left:${fLeft}%;width:${fWidth}%;opacity:${opacity};${border}" 
          data-file="${f.file}" data-rows="${f.rows}" data-range="${f.min_dt} → ${f.max_dt}" data-source="${f.source}"></div>`;
      }

      const gapCount = d.gaps.length;
      const gapBadge = gapCount > 0 ? `<span style="color:var(--red);font-size:10px">⚠${gapCount}</span>` : '';

      html += `<div class="gantt-row" data-path="${d.path}">
        <div class="gantt-label">
          <span class="exchange-badge ${exchangeClass(d.source_dir)}">${d.source_dir}</span>
          <span style="color:var(--muted)">${d.datatype}</span>
          ${gapBadge}
        </div>
        <div class="gantt-bar-container">${fileBars}${gapBars}</div>
        <div class="gantt-meta"><span class="rows">${formatNum(d.total_rows)}</span> <span style="color:var(--muted)">${d.span_hours}h</span></div>
      </div>`;
    }
  }

  chartEl.innerHTML = html;

  // Render ticks
  setTimeout(() => {
    const ticksEl = document.getElementById('ticks');
    if (!ticksEl) return;
    const w = ticksEl.offsetWidth;
    const numTicks = Math.min(12, Math.floor(w / 80));
    let ticksHtml = '';
    for (let i = 0; i <= numTicks; i++) {
      const ts = globalMin + (range * i / numTicks);
      const d = new Date(ts);
      const label = `${d.getUTCMonth()+1}/${d.getUTCDate()} ${String(d.getUTCHours()).padStart(2,'0')}:00`;
      const pct = (i / numTicks * 100).toFixed(1);
      ticksHtml += `<div class="tick" style="left:${pct}%">${label}</div>`;
    }
    ticksEl.innerHTML = ticksHtml;
  }, 50);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  chartEl.addEventListener('mouseover', e => {
    const bar = e.target.closest('.gantt-bar');
    const gap = e.target.closest('.gantt-gap');
    if (bar) {
      const row = bar.closest('.gantt-row');
      const path = row?.dataset.path || '';
      tooltip.innerHTML = `<h3>${path}</h3>
        <div class="tt-row"><span class="tt-label">File:</span><span class="tt-value">${bar.dataset.file}</span></div>
        <div class="tt-row"><span class="tt-label">Source:</span><span class="tt-value">${bar.dataset.source}</span></div>
        <div class="tt-row"><span class="tt-label">Rows:</span><span class="tt-value">${Number(bar.dataset.rows).toLocaleString()}</span></div>
        <div class="tt-row"><span class="tt-label">Range:</span><span class="tt-value">${bar.dataset.range}</span></div>`;
      tooltip.classList.add('show');
    } else if (gap) {
      tooltip.innerHTML = `<h3 style="color:var(--red)">⚠️ Data Gap</h3>
        <div class="tt-row"><span class="tt-label">Duration:</span><span class="tt-value tt-gap">${gap.dataset.gap}</span></div>`;
      tooltip.classList.add('show');
    }
  });
  chartEl.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  });
  chartEl.addEventListener('mouseout', e => {
    if (!e.target.closest('.gantt-bar') && !e.target.closest('.gantt-gap')) {
      tooltip.classList.remove('show');
    }
  });
}

init();
</script>
</body>
</html>
